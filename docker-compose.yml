services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cliniq
      POSTGRES_PASSWORD: cliniq
      POSTGRES_DB: cliniq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniq"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://cliniq:cliniq@db:5432/cliniq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface

volumes:
  postgres_data:
  huggingface_cache:
