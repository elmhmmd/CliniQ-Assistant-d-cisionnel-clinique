global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers: []

scrape_configs:
  - job_name: cliniq-api
    static_configs:
      - targets: ["api:8000"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
